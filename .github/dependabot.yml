# Set update schedule for GitHub Actions and pre-commit

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "https://github.com/pre-commit/mirrors-clang-format"
